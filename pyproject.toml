[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
# Enable common linting rules
select = ["E", "F", "I", "N"]

# Allow mathematical variable names in specific modules
[tool.ruff.lint.per-file-ignores]
# Scientific/mathematical modules can use mathematical notation
"src/simulation/dynamics.py" = ["N806"]  # Allow mathematical variable names
"src/core/neural_network.py" = ["N803"]  # Allow mathematical parameter names (Theta, etc.)

[tool.mypy]
strict = true
python_version = "3.12"